# Default 10-finger channel layout for the Quattrocento simulator.
# Simulator wire format: channels 0-9 are force signals, channel 10 is trigger.
#
# Usage:
#   python -m quattrocento.simulator
#   python -m quattrocento --source=rebroadcast --host=127.0.0.1 --port=31000 \
#       --channels=quattrocento/channels_default.toml --log-dir=./capture_logs

[labels]
"R Thumb"  = { index = 2, scale = 5 }
"R Index"  = { index = 3, scale = 5 }
"R Middle" = { index = 4, scale = 5 }
"R Ring"   = { index = 5, scale = 5 }
"R Little" = { index = 6, scale = 5 }
"L Thumb"  = { index = 7, scale = 5 }
"L Index"  = { index = 8, scale = 5 }
"L Middle" = { index = 9, scale = 5 }
"L Ring"   = { index = 10, scale = 5 }
"L Little" = { index = 11, scale = 5 }
"trigger"  = { index = 12, scale = 5.0 }
"EMG 1"    = { index = 0, scale = 16.667, kind = "emg" }
"EMG 2"    = { index = 1, scale = 16.667, kind = "emg" }
# "EMG 3"    = { index = 2, scale = 16.667, kind = "emg" }
